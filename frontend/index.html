<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Symptom Checker</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #e3f2fd, #e8f5e9);
    }

    .container {
      max-width: 600px;
      margin: auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      color: #1565c0;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      max-width: 70%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 12px;
    }

    .user {
      background: #1976d2;
      color: white;
      margin-left: auto;
    }

    .bot {
      background: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .input-box {
      display: flex;
      padding: 10px;
      background: white;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .loading {
      font-size: 12px;
      color: gray;
    }

    .disclaimer {
      text-align: center;
      font-size: 12px;
      color: red;
      padding: 5px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">🧠 AI Symptom Checker</div>

  <div class="chat" id="chat"></div>

  <div class="input-box">
    <input id="input" placeholder="Enter your symptoms..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <div class="disclaimer">
    ⚠️ This is not a medical diagnosis. Consult a doctor.
  </div>

</div>

<script>
  const chat = document.getElementById("chat");

  function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value;

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const loading = document.createElement("div");
    loading.className = "loading";
    loading.innerText = "AI is thinking...";
    chat.appendChild(loading);

    try {
      const res = await fetch("http://127.0.0.1:5000/analyze", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ symptoms: text })
      });

      const data = await res.json();

      chat.removeChild(loading);

      addMessage(data.result, "bot");

    } catch (err) {
      chat.removeChild(loading);
      addMessage("Error connecting to server", "bot");
    }
  }
</script>

</body>
</html>
